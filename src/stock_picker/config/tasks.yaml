find_trending_companies:
  description: >
    Today's date is {current_date}. Use your search tool to find companies in {sector} that are trending in the news RIGHT NOW as of today.
    You MUST run a search before selecting any companies - do not rely on prior knowledge.
    Base your selection entirely on what appears in the search results.
    Avoid obvious large-cap defaults like Apple, Microsoft, Google, Amazon, or Meta unless they have a specific major news event today.
    Look for less obvious companies with significant recent news: earnings surprises, product launches, M&A activity, regulatory decisions, or analyst upgrades.
  expected_output: >
    A list of 2-3 trending companies in {sector} that are in the news today, with the specific news event driving each one
  agent: trending_company_finder
  output_file: output/trending_companies.json

research_trending_companies:
  description: >
    Given a list of trending companies, provide detailed analysis of each company in a report by searching online
  expected_output: >
    A report containing detailed analysis of each company
  agent: financial_researcher
  context:
    - find_trending_companies
  output_file: output/research_report.json

pick_best_company:
  description: >
    Analyze the research findings and pick the best company for investment.
    Send a push notification to the user with the decision and 1 sentence rationale.
    Then respond with a detailed report on why you chose this company, and which companies were not selected.
  expected_output: >
    The chosen company and why it was chosen; the companies that were not selected and why they were not selected.
  agent: stock_picker
  context:
    - research_trending_companies
  output_file: output/decision.md
